<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Memories</title>
    <style>
        :root { --netflix-red: #E50914; --bg-color: #141414; --text-color: #fff; --gray: #808080; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; overflow: hidden; }
        
        /* INTRO */
        #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .netflix-logo { width: 300px; max-width: 80%; animation: zoomOut 3.5s forwards; }
        @keyframes zoomOut { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; visibility: hidden; } }

        /* PROFILES */
        #profile-screen { display: none; text-align: center; height: 100vh; flex-direction: column; justify-content: center; align-items: center; }
        h1 { font-size: clamp(1.5rem, 5vw, 3.5rem); margin-bottom: 30px; }
        .profile-container { display: flex; gap: 2vw; justify-content: center; flex-wrap: wrap; }
        .profile { cursor: pointer; width: 150px; text-align: center; }
        .profile img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 4px; transition: 0.2s; border: 3px solid transparent; background: #333; }
        .profile:hover img { transform: scale(1.05); border: 3px solid white; }
        .profile p { color: var(--gray); margin-top: 10px; }

        /* GALLERY */
        #gallery-screen { display: none; padding: 20px 4%; }
        .logo { color: var(--netflix-red); font-size: 2rem; font-weight: bold; margin-bottom: 20px; }
        .row-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .movie-card { background: #2f2f2f; border-radius: 4px; cursor: pointer; transition: 0.3s; overflow: hidden; }
        .movie-card:hover { transform: scale(1.05); z-index: 5; }
        .movie-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        
        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; }
        .modal-content { width: 95%; max-width: 900px; margin: 50px auto; background: #181818; border-radius: 8px; position: relative; }
        .modal-body { padding: 30px; }
        video { width: 100%; aspect-ratio: 16/9; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: white; font-size: 2.5rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <img class="netflix-logo" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
        <audio id="tudum-sound" src="https://www.myinstants.com/media/sounds/tudum.mp3"></audio>
    </div>

    <div id="profile-screen">
        <h1>Who's watching?</h1>
        <div class="profile-container">
            <div class="profile" onclick="alert('Access Denied')"><img src="./alan.jpg?v=1"><p>Alan</p></div>
            <div class="profile" onclick="alert('Access Denied')"><img src="./aiden.jpg?v=1"><p>Aiden</p></div>
            <div class="profile" onclick="showGallery()"><img src="./mom.jpg?v=1"><p>Mom</p></div>
            <div class="profile" onclick="alert('Access Denied')"><img src="./dad.jpg?v=1"><p>Dad</p></div>
        </div>
    </div>

    <div id="gallery-screen">
        <div class="logo">MEMORIES</div>
        <div id="movie-grid" class="row-container"></div>
    </div>

    <div id="video-modal" class="modal">
        <span class="close-btn" onclick="closeVideo()">&times;</span>
        <div class="modal-content">
            <video id="main-player" controls></video>
            <div class="modal-body">
                <h2 id="modal-title"></h2>
                <p id="modal-desc"></p>
            </div>
        </div>
    </div>

    <script>
        const memoryData = [
            { title: "Memory 1", desc: "Description here.", file: "video1.mp4", thumb: "pic1.jpg" },
            { title: "Memory 2", desc: "Description here.", file: "video2.mp4", thumb: "pic2.jpg" }
        ];

        window.onload = () => {
            document.getElementById('tudum-sound').play().catch(() => {});
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('profile-screen').style.display = 'flex';
            }, 3500);
        };

        function showGallery() {
            document.getElementById('profile-screen').style.display = 'none';
            document.getElementById('gallery-screen').style.display = 'block';
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = memoryData.map((m, i) => `
                <div class="movie-card" onclick="openVideo(${i})">
                    <img src="./${m.thumb}?v=1">
                    <div style="padding:10px;"><b>${m.title}</b></div>
                </div>
            `).join('');
        }

        function openVideo(i) {
            const m = memoryData[i];
            const p = document.getElementById('main-player');
            p.src = m.file;
            document.getElementById('modal-title').innerText = m.title;
            document.getElementById('modal-desc').innerText = m.desc;
            document.getElementById('video-modal').style.display = 'block';
            p.play();
        }

        function closeVideo() {
            document.getElementById('video-modal').style.display = 'none';
            document.getElementById('main-player').pause();
        }
    </script>
</body>
</html>
