<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momflix Memories</title>
    <style>
        :root { --netflix-red: #E50914; --bg-color: #141414; --text-color: #fff; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; overflow-x: hidden; }

        /* NAVIGATION */
        #main-nav { position: fixed; top: 0; width: 100%; height: 70px; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 10%, transparent); display: flex; align-items: center; padding: 0 4%; z-index: 1000; }
        .nav-logo { color: var(--netflix-red); font-size: 2.2rem; font-weight: bold; text-transform: uppercase; letter-spacing: -1px; }

        /* PROFILES */
        #profile-screen { display: flex; text-align: center; height: 100vh; flex-direction: column; justify-content: center; align-items: center; }
        .profile-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .profile { cursor: pointer; width: 150px; text-align: center; }
        .profile img { width: 150px; height: 150px; object-fit: cover; border-radius: 4px; transition: 0.2s; border: 3px solid transparent; }
        .profile:hover img { transform: scale(1.05); border: 3px solid white; }
        .profile p { color: #808080; margin-top: 10px; font-size: 1.2rem; }

        /* MOMFLIX INTRO ANIMATION */
        #login-animation { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 5000; justify-content: center; align-items: center; }
        .momflix-text { color: var(--netflix-red); font-size: 5rem; font-weight: bold; text-transform: uppercase; letter-spacing: -2px; animation: zoomAndFade 2.5s forwards; }
        @keyframes zoomAndFade { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }

        /* HERO */
        #hero-section { height: 85vh; position: relative; background-size: cover; background-position: center; display: none; align-items: center; padding: 0 4%; }
        #hero-section::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 35%; background: linear-gradient(to top, var(--bg-color), transparent); }
        .hero-content { z-index: 10; max-width: 650px; }
        .hero-title { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: bold; margin-bottom: 10px; }
        .btn { padding: 12px 30px; border-radius: 4px; font-weight: bold; font-size: 1.1rem; border: none; cursor: pointer; }
        .btn-play { background: white; color: black; }
        .btn-info { background: rgba(109, 109, 110, 0.7); color: white; margin-left: 10px; }

        /* ROWS */
        #gallery-screen { display: none; margin-top: -120px; position: relative; z-index: 20; padding-bottom: 100px; }
        .row { position: relative; padding: 0 4%; margin-bottom: 40px; }
        .row-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 10px; }
        .row-wrapper { position: relative; display: flex; align-items: center; }
        .row-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 20px 0; scrollbar-width: none; scroll-behavior: smooth; width: 100%; }
        .row-scroll::-webkit-scrollbar { display: none; }
        .movie-card { flex: 0 0 250px; height: 140px; background: #2f2f2f; border-radius: 4px; cursor: pointer; transition: transform 0.4s; overflow: hidden; }
        .movie-card:hover { transform: scale(1.1); z-index: 100; }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }

        /* ARROWS */
        .handle { position: absolute; top: 20px; bottom: 20px; width: 40px; background: rgba(0,0,0,0.5); color: white; display: flex; justify-content: center; align-items: center; font-size: 2rem; cursor: pointer; z-index: 1000; opacity: 0; border: none; }
        .row:hover .handle { opacity: 1; }
        .left-handle { left: 0; }
        .right-handle { right: 0; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 6000; }
        .modal-content { width: 90%; max-width: 800px; margin: 50px auto; background: #181818; border-radius: 8px; position: relative; }
        video, #modal-img { width: 100%; display: none; }
        .modal-body { padding: 30px; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: white; font-size: 2.5rem; cursor: pointer; z-index: 6001; }
    </style>
</head>
<body>

    <audio id="tudum-sound" src="https://www.myinstants.com/media/sounds/tudum.mp3"></audio>

    <div id="profile-screen">
        <h1>Who's watching?</h1>
        <div class="profile-container">
            <div class="profile" onclick="alert('Access Restricted')"><img src="./alan.jpg"><p>Alan</p></div>
            <div class="profile" onclick="alert('Access Restricted')"><img src="./aiden.jpg"><p>Aiden</p></div>
            <div class="profile" onclick="startLogin()"><img src="./mom.jpg"><p>Mom</p></div>
            <div class="profile" onclick="alert('Access Restricted')"><img src="./dad.jpg"><p>Dad</p></div>
        </div>
    </div>

    <div id="login-animation">
        <div class="momflix-text">Momflix</div>
    </div>

    <div id="main-content" style="display:none;">
        <nav id="main-nav"><div class="nav-logo">Momflix</div></nav>
        <div id="hero-section">
            <div class="hero-content">
                <div class="hero-title">Barnes Family Memories</div>
                <div class="hero-desc">Experience the journey that started it all. Dedicating this collection to the woman who gave us everything.</div>
                <div class="hero-btns">
                    <button class="btn btn-play" onclick="openVideo(0)">▶ Play</button>
                    <button class="btn btn-info" onclick="showBirthdayMessage()">ⓘ More Info</button>
                </div>
            </div>
        </div>
        <div id="gallery-screen">
            <div class="row"><div class="row-title">Our Shared Journey</div><div class="row-wrapper"><button class="handle left-handle" onclick="scrollRow('vids', -1)">&#10094;</button><div id="vids" class="row-scroll"></div><button class="handle right-handle" onclick="scrollRow('vids', 1)">&#10095;</button></div></div>
            <div class="row"><div class="row-title">Family Favorites</div><div class="row-wrapper"><button class="handle left-handle" onclick="scrollRow('p1', -1)">&#10094;</button><div id="p1" class="row-scroll"></div><button class="handle right-handle" onclick="scrollRow('p1', 1)">&#10095;</button></div></div>
            <div class="row"><div class="row-title">More Memories</div><div class="row-wrapper"><button class="handle left-handle" onclick="scrollRow('p2', -1)">&#10094;</button><div id="p2" class="row-scroll"></div><button class="handle right-handle" onclick="scrollRow('p2', 1)">&#10095;</button></div></div>
        </div>
    </div>

    <div id="video-modal" class="modal">
        <span class="close-btn" onclick="closeVideo()">&times;</span>
        <div class="modal-content">
            <video id="main-player" controls></video>
            <img id="modal-img">
            <div class="modal-body"><h2 id="modal-title"></h2><p id="modal-desc"></p></div>
        </div>
    </div>

    <script>
        const personalMemories = [
            { title: "Where Motherhood Began", desc: "The birth of Alan. The start of it all.", file: "video1.mp4", thumb: "pic1.jpg" },
            { title: "The Family Grows", desc: "Welcoming Aiden! We all love him so much.", file: "video2.mp4", thumb: "pic2.jpg" },
            { title: "Zen Joins the Pack", desc: "Four paws and a heart of gold! Zen brought so much joy.", file: "video3.mp4", thumb: "pic3.jpg" },
            { title: "To Many More Memories", desc: "Thank you for being such an awesome mother.", file: "video4.mp4", thumb: "pic4.jpg" },
            { title: "Young Alan", desc: "A throwback to Alan's younger years. Time flies!", file: "video5.mp4", thumb: "pic5.jpg" },
            { title: "Young Aiden", desc: "A sweet memory of Aiden growing up.", file: "video6.mp4", thumb: "pic6.jpg" }
        ];

        function startLogin() {
            document.getElementById('tudum-sound').play().catch(() => {});
            document.getElementById('profile-screen').style.display = 'none';
            document.getElementById('login-animation').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('login-animation').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                enterGallery();
            }, 2500);
        }

        function enterGallery() {
            document.getElementById('hero-section').style.backgroundImage = "url('./background.jpg')";
            document.getElementById('hero-section').style.display = 'flex';
            document.getElementById('gallery-screen').style.display = 'block';
            
            document.getElementById('vids').innerHTML = personalMemories.map((m, i) => `<div class="movie-card" onclick="openVideo(${i})"><img src="./${m.thumb}?v=15"></div>`).join('');

            let h1 = ""; for (let i = 1; i <= 10; i++) h1 += `<div class="movie-card" onclick="openPhoto('./xpic${i}.jpg')"><img src="./xpic${i}.jpg?v=15"></div>`;
            document.getElementById('p1').innerHTML = h1;

            let h2 = ""; for (let i = 11; i <= 20; i++) h2 += `<div class="movie-card" onclick="openPhoto('./xpic${i}.jpg')"><img src="./xpic${i}.jpg?v=15"></div>`;
            document.getElementById('p2').innerHTML = h2;
        }

        function scrollRow(id, dir) { const el = document.getElementById(id); el.scrollBy({ left: (el.clientWidth * 0.8) * dir, behavior: 'smooth' }); }
        function showBirthdayMessage() { alert("Happy Birthday mama! We love you soooo much. Enjoy this netflix memory lane!"); }

        function openVideo(i) {
            const m = personalMemories[i];
            const p = document.getElementById('main-player');
            const img = document.getElementById('modal-img');
            img.style.display = 'none'; p.style.display = 'block'; p.src = m.file + "?v=15";
            document.getElementById('modal-title').innerText = m.title;
            document.getElementById('modal-desc').innerText = m.desc;
            document.getElementById('video-modal').style.display = 'block'; p.play();
        }

        function openPhoto(src) {
            const p = document.getElementById('main-player');
            const img = document.getElementById('modal-img');
            p.style.display = 'none'; img.style.display = 'block'; img.src = src + "?v=15";
            document.getElementById('modal-title').innerText = "Family Photo";
            document.getElementById('modal-desc').innerText = "A captured moment in time.";
            document.getElementById('video-modal').style.display = 'block';
        }

        function closeVideo() { document.getElementById('video-modal').style.display = 'none'; document.getElementById('main-player').pause(); }
    </script>
</body>
</html>
