<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Memories</title>
    <style>
        :root { 
            --netflix-red: #E50914; 
            --bg-color: #141414; 
            --text-color: #fff; 
            --gray: #808080;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; 
            overflow: hidden; /* Prevent scrolling during intro */
            -webkit-font-smoothing: antialiased;
        }

        /* 1. INTRO ANIMATION */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .netflix-logo {
            width: 300px;
            max-width: 80%;
            animation: zoomOut 3.5s forwards;
        }

        @keyframes zoomOut {
            0% { transform: scale(1); opacity: 1; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; visibility: hidden; }
        }

        /* 2. PROFILE SCREEN */
        #profile-screen {
            display: none; /* Shown via JS */
            text-align: center;
            height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg-color);
        }

        h1 { font-size: clamp(1.5rem, 5vw, 3.5rem); font-weight: 500; margin-bottom: 30px; }

        .profile-container {
            display: flex;
            gap: 2vw;
            justify-content: center;
            flex-wrap: wrap;
            padding: 0 20px;
        }

        .profile { cursor: pointer; width: 150px; text-align: center; }
        
        /* The Profile Image Style */
        .profile img { 
            width: 100%; 
            aspect-ratio: 1/1; 
            object-fit: cover;
            border-radius: 4px; 
            transition: transform 0.2s, border 0.2s; 
            border: 3px solid transparent; 
            background: #333; /* Fallback color while loading */
        }

        .profile:hover img { transform: scale(1.05); border: 3px solid white; }
        .profile p { color: var(--gray); margin-top: 10px; font-size: 1.2rem; }
        .profile:hover p { color: white; }

        /* 3. MAIN GALLERY */
        #gallery-screen { display: none; padding: 20px 4%; }
        .logo { color: var(--netflix-red); font-size: 2rem; font-weight: bold; margin-bottom: 20px; }
        
        .row-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .profile { width: 120px; }
            .row-container { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        }

        .movie-card {
            background: #2f2f2f;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.3s;
            overflow: hidden;
            position: relative;
        }
        .movie-card:hover { transform: scale(1.05); z-index: 5; }
        .movie-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
        .card-info { padding: 10px; font-size: 0.9rem; background: #181818; }

        /* 4. MODAL PLAYER */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            overflow-y: auto;
        }
        .modal-content { 
            width: 95%; max-width: 900px; margin: 50px auto; 
            background: #181818; border-radius: 8px; position: relative;
        }
        .modal-body { padding: 30px; }
        .modal-title { font-size: 2rem; margin-bottom: 10px; font-weight: bold; }
        .modal-desc { color: #ccc; line-height: 1.6; font-size: 1.1rem; }
        video { width: 100%; aspect-ratio: 16/9; background: #000; }
        .close-btn {
            position: absolute; top: 15px; right: 20px;
            color: white; font-size: 2.5rem; cursor: pointer; z-index: 2001;
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <img class="netflix-logo" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix">
        <audio id="tudum-sound" src="https://www.myinstants.com/media/sounds/tudum.mp3" preload="auto"></audio>
    </div>

    <div id="profile-screen">
        <h1>Who's watching?</h1>
        <div class="profile-container">
            <div class="profile" onclick="alert('Access Denied')"><img src="alan.jpg" onerror="this.src='https://ui-avatars.com/api/?name=Alan&background=0D8ABC&color=fff'"><p>Alan</p></div>
            <div class="profile" onclick="alert('Access Denied')"><img src="aiden.jpg" onerror="this.src='https://ui-avatars.com/api/?name=Aiden&background=6610f2&color=fff'"><p>Aiden</p></div>
            <div class="profile" onclick="showGallery()"><img src="mom.jpg" onerror="this.src='https://ui-avatars.com/api/?name=Mom&background=e83e8c&color=fff'"><p>Mom</p></div>
            <div class="profile" onclick="alert('Access Denied')"><img src="dad.jpg" onerror="this.src='https://ui-avatars.com/api/?name=Dad&background=fd7e14&color=fff'"><p>Dad</p></div>
        </div>
    </div>

    <div id="gallery-screen">
        <div class="logo">MEMORIES</div>
        <h2 style="margin-bottom: 25px;">My Favorites</h2>
        <div id="movie-grid" class="row-container"></div>
    </div>

    <div id="video-modal" class="modal">
        <span class="close-btn" onclick="closeVideo()">&times;</span>
        <div class="modal-content">
            <video id="main-player" controls></video>
            <div class="modal-body">
                <div id="modal-title" class="modal-title"></div>
                <div id="modal-desc" class="modal-desc"></div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION: Edit your memory text here
        const memoryData = [
            { title: "Summer Lake Trip", desc: "That day we spent out on the water. One of my favorite memories!", file: "video1.mp4", thumb: "pic1.jpg" },
            { title: "Holiday Dinner", desc: "The whole family together for the holidays. So much good food!", file: "video2.mp4", thumb: "pic2.jpg" },
            { title: "Morning Walk", desc: "A peaceful morning catching up. Always love our chats.", file: "video3.mp4", thumb: "pic3.jpg" },
            { title: "Graduation Prep", desc: "Getting ready for the big finish. Thanks for the support!", file: "video4.mp4", thumb: "pic4.jpg" }
        ];

        // Handle Intro Sequence
        window.onload = () => {
            const sound = document.getElementById('tudum-sound');
            sound.play().catch(() => console.log("Sound waiting for click"));
            
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('profile-screen').style.display = 'flex';
                document.body.style.overflow = 'auto'; 
            }, 3500);
        };

        function showGallery() {
            document.getElementById('profile-screen').style.display = 'none';
            document.getElementById('gallery-screen').style.display = 'block';
            renderCards();
        }

        function renderCards() {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = memoryData.map((m, index) => `
                <div class="movie-card" onclick="openVideo(${index})">
                    <img src="${m.thumb}" alt="${m.title}" onerror="this.src='https://via.placeholder.com/300x169/2f2f2f/ffffff?text=Memory'">
                    <div class="card-info"><b>${m.title}</b></div>
                </div>
            `).join('');
        }

        function openVideo(index) {
            const m = memoryData[index];
            const player = document.getElementById('main-player');
            player.src = m.file;
            document.getElementById('modal-title').innerText = m.title;
            document.getElementById('modal-desc').innerText = m.desc;
            document.getElementById('video-modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
            player.play();
        }

        function closeVideo() {
            document.getElementById('video-modal').style.display = 'none';
            document.getElementById('main-player').pause();
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
