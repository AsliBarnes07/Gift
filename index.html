<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Memories</title>
    <style>
        :root { 
            --netflix-red: #E50914; 
            --bg-color: #141414; 
            --text-color: #fff; 
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* 1. PROFILE SCREEN */
        #profile-screen {
            display: flex;
            text-align: center;
            height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .profile-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .profile { cursor: pointer; width: 150px; text-align: center; }
        .profile img { width: 100%; aspect-ratio: 1/1; border-radius: 4px; transition: 0.2s; border: 3px solid transparent; }
        .profile:hover img { transform: scale(1.05); border: 3px solid white; }
        .profile p { color: #808080; margin-top: 10px; font-size: 1.2rem; }

        /* 2. TRANSITION */
        #login-animation {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 5000;
            justify-content: center; align-items: center;
        }
        .n-logo { width: 150px; animation: zoomAndFade 2.5s forwards; }
        @keyframes zoomAndFade { 0% { transform: scale(1); } 100% { transform: scale(4); opacity: 0; } }

        /* 3. HERO SECTION (Featured Memory) */
        #hero-section {
            height: 85vh;
            position: relative;
            background-size: cover;
            background-position: center;
            display: none;
            align-items: center;
            padding: 0 4%;
        }
        /* Netflix Bottom Fade Overlay */
        #hero-section::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 40%;
            background: linear-gradient(to top, var(--bg-color), transparent);
        }
        .hero-content { z-index: 10; max-width: 700px; }
        .hero-title { font-size: 4.5rem; font-weight: bold; margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .hero-desc { font-size: 1.3rem; margin-bottom: 25px; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); line-height: 1.4; }
        
        .hero-buttons { display: flex; gap: 15px; }
        .btn {
            padding: 12px 35px; border-radius: 4px; font-weight: bold; font-size: 1.2rem;
            border: none; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }
        .btn-play { background: white; color: black; }
        .btn-play:hover { background: rgba(255,255,255,0.7); }
        .btn-info { background: rgba(109, 109, 110, 0.7); color: white; }
        .btn-info:hover { background: rgba(109, 109, 110, 0.4); }

        /* 4. SCROLLABLE ROWS */
        #gallery-screen { display: none; margin-top: -120px; position: relative; z-index: 20; padding-bottom: 50px; }
        .row { padding-left: 4%; margin-bottom: 30px; }
        .row-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 10px; }
        
        .row-scroll {
            display: flex;
            gap: 10px;
            overflow-x: scroll;
            padding: 20px 0;
            scrollbar-width: none; /* Hide for Firefox */
        }
        .row-scroll::-webkit-scrollbar { display: none; } /* Hide for Chrome */

        .movie-card {
            min-width: 300px;
            aspect-ratio: 16/9;
            background: #2f2f2f;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.4s ease-out;
            overflow: hidden;
        }
        .movie-card:hover { transform: scale(1.15); z-index: 100; }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }

        /* 5. MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 6000; }
        .modal-content { width: 95%; max-width: 850px; margin: 50px auto; background: #181818; border-radius: 8px; position: relative; overflow: hidden; }
        video { width: 100%; background: #000; }
        .modal-body { padding: 25px; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: white; font-size: 2.5rem; cursor: pointer; z-index: 6001; }
    </style>
</head>
<body>

    <audio id="tudum-sound" src="https://www.myinstants.com/media/sounds/tudum.mp3"></audio>

    <div id="profile-screen">
        <h1>Who's watching?</h1>
        <div class="profile-container">
            <div class="profile" onclick="alert('Access Restricted')"><img src="./alan.jpg?v=1"><p>Alan</p></div>
            <div class="profile" onclick="alert('Access Restricted')"><img src="./aiden.jpg?v=1"><p>Aiden</p></div>
            <div class="profile" onclick="startLogin()"><img src="./mom.jpg?v=1"><p>Mom</p></div>
            <div class="profile" onclick="alert('Access Restricted')"><img src="./dad.jpg?v=1"><p>Dad</p></div>
        </div>
    </div>

    <div id="login-animation">
        <img class="n-logo" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
    </div>

    <div id="hero-section">
        <div class="hero-content">
            <div class="hero-title">Barnes Family Memories</div>
            <div class="hero-desc">Every moment captured, from the graduation marches to the quiet mornings. A special collection curated just for Mom.</div>
            <div class="hero-buttons">
                <button class="btn btn-play" onclick="openVideo(0)">▶ Play</button>
                <button class="btn btn-info" onclick="alert('This is a collection of our best memories!')">ⓘ More Info</button>
            </div>
        </div>
    </div>

    <div id="gallery-screen">
        <div class="row">
            <div class="row-title">Trending Now</div>
            <div id="row-1" class="row-scroll"></div>
        </div>
        <div class="row">
            <div class="row-title">Because You Are The Best</div>
            <div id="row-2" class="row-scroll"></div>
        </div>
    </div>

    <div id="video-modal" class="modal">
        <span class="close-btn" onclick="closeVideo()">&times;</span>
        <div class="modal-content">
            <video id="main-player" controls></video>
            <div class="modal-body">
                <h2 id="modal-title" style="margin:0;"></h2>
                <p id="modal-desc" style="color:#808080; margin-top:10px;"></p>
            </div>
        </div>
    </div>

    <script>
        const memoryData = [
            { title: "Summer Lake Trip", desc: "A great day out on the water.", file: "video1.mp4", thumb: "pic1.jpg" },
            { title: "The Big Graduation", desc: "A proud day for the Barnes family.", file: "video2.mp4", thumb: "pic2.jpg" },
            { title: "Birthday Bash", desc: "Celebrating in style at home.", file: "video3.mp4", thumb: "pic3.jpg" },
            { title: "West Point Visit", desc: "Touring the grounds together.", file: "video4.mp4", thumb: "pic4.jpg" },
            { title: "Holiday Magic", desc: "Opening presents by the tree.", file: "video5.mp4", thumb: "pic5.jpg" },
            { title: "Weekend Brunch", desc: "Nothing beats a family breakfast.", file: "video6.mp4", thumb: "pic6.jpg" }
        ];

        function startLogin() {
            document.getElementById('tudum-sound').play();
            document.getElementById('profile-screen').style.display = 'none';
            document.getElementById('login-animation').style.display = 'flex';

            setTimeout(() => {
                document.getElementById('login-animation').style.display = 'none';
                enterGallery();
            }, 2500);
        }

        function enterGallery() {
            const hero = document.getElementById('hero-section');
            hero.style.backgroundImage = "url('./background.jpg')";
            hero.style.display = 'flex';
            document.getElementById('gallery-screen').style.display = 'block';
            
            // Build Row 1 (Memories 0-3)
            const r1 = document.getElementById('row-1');
            r1.innerHTML = memoryData.slice(0, 4).map((m, i) => createCard(m, i)).join('');
            
            // Build Row 2 (Memories 4-5 + repeats for length)
            const r2 = document.getElementById('row-2');
            r2.innerHTML = memoryData.slice(2, 6).map((m, i) => createCard(m, i + 2)).join('');
        }

        function createCard(m, i) {
            return `
                <div class="movie-card" onclick="openVideo(${i})">
                    <img src="./${m.thumb}?v=1">
                </div>
            `;
        }

        function openVideo(i) {
            const m = memoryData[i];
            const player = document.getElementById('main-player');
            player.src = m.file;
            document.getElementById('modal-title').innerText = m.title;
            document.getElementById('modal-desc').innerText = m.desc;
            document.getElementById('video-modal').style.display = 'block';
            player.play();
        }

        function closeVideo() {
            document.getElementById('video-modal').style.display = 'none';
            document.getElementById('main-player').pause();
        }
    </script>
</body>
</html>
