<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Memories</title>
    <style>
        :root { --netflix-red: #E50914; --bg-color: #141414; --text-color: #fff; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; overflow-x: hidden; }

        /* NAVIGATION */
        #main-nav { position: fixed; top: 0; width: 100%; height: 70px; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 10%, transparent); display: flex; align-items: center; padding: 0 4%; z-index: 1000; transition: background 0.5s; }
        .nav-logo { color: var(--netflix-red); font-size: 1.8rem; font-weight: bold; margin-right: 25px; text-transform: uppercase; cursor: pointer; }

        /* PROFILE SCREEN */
        #profile-screen { display: flex; text-align: center; height: 100vh; flex-direction: column; justify-content: center; align-items: center; }
        .profile-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .profile { cursor: pointer; width: 150px; text-align: center; }
        .profile img { width: 100%; aspect-ratio: 1/1; border-radius: 4px; transition: 0.2s; border: 3px solid transparent; }
        .profile:hover img { transform: scale(1.05); border: 3px solid white; }
        .profile p { color: #808080; margin-top: 10px; font-size: 1.2rem; }

        /* TRANSITION */
        #login-animation { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 5000; justify-content: center; align-items: center; }
        .n-logo { width: 150px; animation: zoomAndFade 2.5s forwards; }
        @keyframes zoomAndFade { 0% { transform: scale(1); } 100% { transform: scale(4); opacity: 0; } }

        /* BILLBOARD (HERO) */
        #hero-section { height: 85vh; position: relative; background-size: cover; background-position: center; display: none; align-items: center; padding: 0 4%; }
        #hero-section::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 35%; background: linear-gradient(to top, var(--bg-color), transparent); }
        .hero-content { z-index: 10; max-width: 650px; }
        .hero-title { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: bold; margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .hero-desc { font-size: 1.2rem; margin-bottom: 25px; line-height: 1.4; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); }
        
        .hero-btns { display: flex; gap: 15px; }
        .btn { padding: 12px 30px; border-radius: 4px; font-weight: bold; font-size: 1.1rem; border: none; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .btn-play { background: white; color: black; }
        .btn-info { background: rgba(109, 109, 110, 0.7); color: white; }

        /* ROWS */
        #gallery-screen { display: none; margin-top: -120px; position: relative; z-index: 20; padding-bottom: 100px; }
        .row { padding-left: 4%; margin-bottom: 40px; }
        .row-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 10px; }
        .row-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 20px 0; scrollbar-width: none; }
        .row-scroll::-webkit-scrollbar { display: none; }
        .movie-card { min-width: 300px; aspect-ratio: 16/9; background: #2f2f2f; border-radius: 4px; cursor: pointer; transition: transform 0.4s; overflow: hidden; }
        .movie-card:hover { transform: scale(1.1); z-index: 100; }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 6000; }
        .modal-content { width: 90%; max-width: 850px; margin: 50px auto; background: #181818; border-radius: 8px; position: relative; overflow: hidden; }
        video { width: 100%; background: #000; }
        .modal-body { padding: 30px; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: white; font-size: 2.5rem; cursor: pointer; z-index: 6001; }
    </style>
</head>
<body>

    <audio id="tudum-sound" src="https://www.myinstants.com/media/sounds/tudum.mp3"></audio>

    <nav id="main-nav" style="display:none;">
        <div class="nav-logo">Memories</div>
    </nav>

    <div id="profile-screen">
        <h1>Who's watching?</h1>
        <div class="profile-container">
            <div class="profile" onclick="alert('Access Restricted')"><img src="./alan.jpg"><p>Alan</p></div>
            <div class="profile" onclick="alert('Access Restricted')"><img src="./aiden.jpg"><p>Aiden</p></div>
            <div class="profile" onclick="startLogin()"><img src="./mom.jpg"><p>Mom</p></div>
            <div class="profile" onclick="alert('Access Restricted')"><img src="./dad.jpg"><p>Dad</p></div>
        </div>
    </div>

    <div id="login-animation">
        <img class="n-logo" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
    </div>

    <div id="hero-section">
        <div class="hero-content">
            <div class="hero-title">Barnes Family Memories</div>
            <div class="hero-desc">Experience the journey that started it all. Dedicating this collection to the woman who gave us everything.</div>
            <div class="hero-btns">
                <button class="btn btn-play" onclick="openVideo(0)">▶ Play</button>
                <button class="btn btn-info" onclick="showBirthdayMessage()">ⓘ More Info</button>
            </div>
        </div>
    </div>

    <div id="gallery-screen">
        <div class="row">
            <div class="row-title">Our Shared Journey</div>
            <div id="row-personal" class="row-scroll"></div>
        </div>
        <div class="row">
            <div class="row-title">Motherly Movies & Nature</div>
            <div id="row-filler" class="row-scroll"></div>
        </div>
    </div>

    <div id="video-modal" class="modal">
        <span class="close-btn" onclick="closeVideo()">&times;</span>
        <div class="modal-content">
            <video id="main-player" controls></video>
            <div class="modal-body">
                <h2 id="modal-title" style="margin:0;"></h2>
                <p id="modal-desc" style="color:#a3a3a3; margin-top:10px; font-size: 1.1rem;"></p>
            </div>
        </div>
    </div>

    <script>
        const personalMemories = [
            { 
                title: "Where Motherhood Began", 
                desc: "This is where it all started—the birth of Alan. The beginning of a lifelong journey and a love that knows no bounds.", 
                file: "video1.mp4", 
                thumb: "pic1.jpg" 
            },
            { 
                title: "The Family Grows", 
                desc: "Our family expanded and we welcomed Aiden into the world! We all love Aiden so much, and life became even brighter with him here.", 
                file: "video2.mp4", 
                thumb: "pic2.jpg" 
            }
        ];

        const fillerMovies = [
            { thumb: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=500" },
            { thumb: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500" },
            { thumb: "https://images.unsplash.com/photo-1591035897819-f4bdf739f446?w=500" },
            { thumb: "https://images.unsplash.com/photo-1547573854-74d2a71d0826?w=500" }
        ];

        function startLogin() {
            document.getElementById('tudum-sound').play().catch(() => {});
            document.getElementById('profile-screen').style.display = 'none';
            document.getElementById('login-animation').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('login-animation').style.display = 'none';
                enterGallery();
            }, 2500);
        }

        function enterGallery() {
            document.getElementById('main-nav').style.display = 'flex';
            const hero = document.getElementById('hero-section');
            hero.style.backgroundImage = "url('./background.jpg')";
            hero.style.display = 'flex';
            document.getElementById('gallery-screen').style.display = 'block';
            
            document.getElementById('row-personal').innerHTML = personalMemories.map((m, i) => `
                <div class="movie-card" onclick="openVideo(${i})"><img src="./${m.thumb}?v=4"></div>
            `).join('');

            document.getElementById('row-filler').innerHTML = fillerMovies.map(m => `
                <div class="movie-card"><img src="${m.thumb}"></div>
            `).join('');
        }

        // BIRTHDAY MESSAGE FUNCTION
        function showBirthdayMessage() {
            alert("Happy Birthday mama! We love you soooo much. Enjoy this netflix memory lane!");
        }

        function openVideo(i) {
            const m = personalMemories[i];
            const player = document.getElementById('main-player');
            player.src = m.file + "?v=4";
            document.getElementById('modal-title').innerText = m.title;
            document.getElementById('modal-desc').innerText = m.desc;
            document.getElementById('video-modal').style.display = 'block';
            player.play();
        }

        function closeVideo() {
            document.getElementById('video-modal').style.display = 'none';
            document.getElementById('main-player').pause();
        }
    </script>
</body>
</html>
