<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Memories</title>
    <style>
        :root { 
            --netflix-red: #E50914; 
            --bg-color: #141414; 
            --text-color: #fff; 
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* 1. PROFILE SCREEN */
        #profile-screen {
            display: flex;
            text-align: center;
            height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .profile-container { display: flex; gap: 2vw; justify-content: center; flex-wrap: wrap; }
        .profile { cursor: pointer; width: 150px; text-align: center; }
        .profile img { width: 100%; aspect-ratio: 1/1; border-radius: 4px; transition: 0.2s; border: 3px solid transparent; }
        .profile:hover img { transform: scale(1.05); border: 3px solid white; }

        /* 2. TRANSITION ANIMATION */
        #login-animation {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 5000;
            justify-content: center;
            align-items: center;
        }
        .n-logo { width: 150px; animation: zoomAndFade 2.5s forwards; }
        @keyframes zoomAndFade { 0% { transform: scale(1); } 100% { transform: scale(4); opacity: 0; } }

        /* 3. FEATURED HERO SECTION */
        #hero-section {
            height: 80vh;
            position: relative;
            background-size: cover;
            background-position: center;
            display: none;
            align-items: center;
            padding: 0 4%;
        }

        /* Creates the Netflix gradient fade at the bottom of the hero */
        #hero-section::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 150px;
            background: linear-gradient(to top, var(--bg-color), transparent);
        }

        .hero-content {
            z-index: 10;
            max-width: 600px;
        }

        .hero-title { font-size: 4rem; font-weight: bold; margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .hero-desc { font-size: 1.2rem; margin-bottom: 20px; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); }

        .play-btn {
            background: white;
            color: black;
            padding: 10px 30px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1.2rem;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .play-btn:hover { background: rgba(255,255,255,0.7); }

        /* 4. GALLERY ROWS */
        #gallery-screen { display: none; padding: 20px 4%; }
        .row-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; }
        .row-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .movie-card { background: #2f2f2f; border-radius: 4px; cursor: pointer; transition: 0.3s; overflow: hidden; }
        .movie-card:hover { transform: scale(1.05); z-index: 5; }
        .movie-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }

        /* 5. MODAL PLAYER */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 6000; }
        .modal-content { width: 95%; max-width: 900px; margin: 50px auto; background: #181818; border-radius: 8px; position: relative; overflow: hidden; }
        video { width: 100%; aspect-ratio: 16/9; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: white; font-size: 2.5rem; cursor: pointer; z-index: 6001; }
    </style>
</head>
<body>

    <audio id="tudum-sound" src="https://www.myinstants.com/media/sounds/tudum.mp3"></audio>

    <div id="profile-screen">
        <h1>Who's watching?</h1>
        <div class="profile-container">
            <div class="profile" onclick="alert('Access Denied')"><img src="./alan.jpg?v=1"><p>Alan</p></div>
            <div class="profile" onclick="alert('Access Denied')"><img src="./aiden.jpg?v=1"><p>Aiden</p></div>
            <div class="profile" onclick="startLogin()"><img src="./mom.jpg?v=1"><p>Mom</p></div>
            <div class="profile" onclick="alert('Access Denied')"><img src="./dad.jpg?v=1"><p>Dad</p></div>
        </div>
    </div>

    <div id="login-animation">
        <img class="n-logo" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg">
    </div>

    <div id="hero-section">
        <div class="hero-content">
            <div class="hero-title">Barnes Family Memories</div>
            <div class="hero-desc">The most heartwarming collection of our favorite times together. Dedicated to the best Mom in the world.</div>
            <button class="play-btn" onclick="openVideo(0)">▶ Play</button>
        </div>
    </div>

    <div id="gallery-screen">
        <div class="row-title">Because You Watched: Last Summer</div>
        <div id="movie-grid" class="row-container"></div>
    </div>

    <div id="video-modal" class="modal">
        <span class="close-btn" onclick="closeVideo()">&times;</span>
        <div class="modal-content">
            <video id="main-player" controls></video>
            <div style="padding:20px;">
                <h2 id="modal-title" style="margin:0;"></h2>
                <p id="modal-desc" style="color:#ccc;"></p>
            </div>
        </div>
    </div>

    <script>
        const memoryData = [
            { title: "Summer Lake Trip", desc: "One of the best days ever.", file: "video1.mp4", thumb: "pic1.jpg" },
            { title: "Graduation Prep", desc: "Almost there! Thanks for everything.", file: "video2.mp4", thumb: "pic2.jpg" },
            { title: "Family Picnic", desc: "Good food and even better company.", file: "video3.mp4", thumb: "pic3.jpg" },
            { title: "Holiday Fun", desc: "The house was so full of life this day.", file: "video4.mp4", thumb: "pic4.jpg" }
        ];

        function startLogin() {
            document.getElementById('tudum-sound').play();
            document.getElementById('profile-screen').style.display = 'none';
            document.getElementById('login-animation').style.display = 'flex';

            setTimeout(() => {
                document.getElementById('login-animation').style.display = 'none';
                enterApp();
            }, 2500);
        }

        function enterApp() {
            // Set the Hero Background
            const hero = document.getElementById('hero-section');
            hero.style.backgroundImage = "url('./background.jpg')";
            hero.style.display = 'flex';
            
            // Show the Gallery
            document.getElementById('gallery-screen').style.display = 'block';
            
            // Build the cards
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = memoryData.map((m, i) => `
                <div class="movie-card" onclick="openVideo(${i})">
                    <img src="./${m.thumb}?v=1">
                    <div style="padding:10px;"><b>${m.title}</b></div>
                </div>
            `).join('');
        }

        function openVideo(i) {
            const m = memoryData[i];
            const player = document.getElementById('main-player');
            player.src = m.file;
            document.getElementById('modal-title').innerText = m.title;
            document.getElementById('modal-desc').innerText = m.desc;
            document.getElementById('video-modal').style.display = 'block';
            player.play();
        }

        function closeVideo() {
            document.getElementById('video-modal').style.display = 'none';
            document.getElementById('main-player').pause();
        }
    </script>
</body>
</html>
