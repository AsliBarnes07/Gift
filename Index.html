<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Memories</title>
    <style>
        :root { --netflix-red: #E50914; --bg-color: #141414; --text-color: #fff; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Centering for Profile Screen */
        .flex-center { display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        /* PROFILE SCREEN */
        #profile-screen { text-align: center; }
        .profile-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .profile { cursor: pointer; width: 140px; text-align: center; }
        .profile img { width: 100%; border-radius: 4px; transition: transform 0.2s, border 0.2s; border: 3px solid transparent; }
        .profile:hover img { transform: scale(1.05); border: 3px solid white; }
        .profile p { color: #808080; margin-top: 10px; }
        .profile:hover p { color: white; }

        /* MAIN GALLERY */
        #gallery-screen { display: none; padding: 20px 4%; }
        .logo { color: var(--netflix-red); font-size: 2rem; font-weight: bold; margin-bottom: 30px; }
        .row-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }

        /* MOVIE CARDS */
        .movie-card {
            position: relative;
            aspect-ratio: 16/9;
            background: #2f2f2f;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.3s;
            overflow: hidden;
        }
        .movie-card:hover { transform: scale(1.08); z-index: 5; }
        .movie-card img { width: 100%; height: 100%; object-fit: cover; }

        /* MODAL (Video Player) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-content { width: 80%; max-width: 900px; position: relative; }
        video { width: 100%; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .close-btn {
            position: absolute; top: -40px; right: 0;
            color: white; font-size: 2rem; cursor: pointer;
        }
    </style>
</head>
<body class="flex-center">

    <div id="profile-screen">
        <h1>Who's watching?</h1>
        <div class="profile-container">
            <div class="profile" onclick="alert('Access Denied')"><img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png"><p>Alan</p></div>
            <div class="profile" onclick="alert('Access Denied')"><img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png"><p>Aiden</p></div>
            <div class="profile" onclick="startApp()"><img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png"><p>Mom</p></div>
            <div class="profile" onclick="alert('Access Denied')"><img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png"><p>Dad</p></div>
        </div>
    </div>

    <div id="gallery-screen">
        <div class="logo">MEMORIES</div>
        <h2 style="margin-bottom: 20px;">Shared Moments</h2>
        <div id="movie-grid" class="row-container">
            </div>
    </div>

    <div id="video-modal" class="modal" onclick="closeVideo()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeVideo()">&times;</span>
            <video id="main-player" controls autoplay></video>
        </div>
    </div>

    <script>
        // CONFIGURATION: Update this number as you add more videos!
        const TOTAL_MEMORIES = 6; 

        function startApp() {
            document.getElementById('profile-screen').style.display = 'none';
            document.body.classList.remove('flex-center');
            document.getElementById('gallery-screen').style.display = 'block';
            loadMemories();
        }

        function loadMemories() {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = ''; // Clear grid

            for (let i = 1; i <= TOTAL_MEMORIES; i++) {
                const card = document.createElement('div');
                card.className = 'movie-card';
                // Uses pic1.jpg, pic2.jpg, etc.
                card.innerHTML = `<img src="pic${i}.jpg" alt="Memory ${i}">`;
                // Links to video1.mp4, video2.mp4, etc.
                card.onclick = () => openVideo(`video${i}.mp4`);
                grid.appendChild(card);
            }
        }

        function openVideo(src) {
            const modal = document.getElementById('video-modal');
            const player = document.getElementById('main-player');
            player.src = src;
            modal.style.display = 'flex';
        }

        function closeVideo() {
            const modal = document.getElementById('video-modal');
            const player = document.getElementById('main-player');
            player.pause();
            modal.style.display = 'none';
        }
    </script>
</body>
</html>
